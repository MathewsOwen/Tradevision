<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHAMARKETCAP | Pro Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000; --surface: #0d1117; --accent: #00f2ff;
            --up: #00ff88; --down: #ff3366; --text: #f0f3f5;
            --text-dim: #848e9c; --border: #222222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            overflow: hidden; background-image: radial-gradient(circle at 50% 50%, #0a1118 0%, #000 100%);
        }

        /* HEADER & TICKER */
        header { background: #000; padding: 15px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 20px; letter-spacing: 1px; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        .ticker-wrap { background: #000; border-bottom: 1px solid var(--border); padding: 8px 0; overflow: hidden; }
        .ticker { display: inline-block; white-space: nowrap; animation: scroll 60s linear infinite; font-family: 'JetBrains Mono'; font-size: 11px; color: var(--up); }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        .container { display: flex; height: calc(100vh - 105px); }

        /* SIDEBAR */
        aside { width: 180px; padding: 20px; border-right: 1px solid var(--border); background: #05070a; }
        .nav-item { padding: 12px; color: var(--text-dim); cursor: pointer; font-size: 10px; font-weight: 700; border-radius: 4px; margin-bottom: 5px; text-transform: uppercase; transition: 0.2s; }
        .nav-item.active { background: #1e2329; color: var(--accent); border-left: 3px solid var(--accent); }

        /* GRID */
        main { flex: 1; padding: 25px; overflow-y: auto; position: relative; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
        .card { background: var(--surface); border-radius: 10px; padding: 20px; border: 1px solid var(--border); transition: 0.3s; cursor: pointer; position: relative; }
        .card:hover { border-color: var(--accent); background: #161b22; transform: translateY(-3px); }
        .symbol { color: var(--accent); font-size: 12px; font-weight: 700; margin-bottom: 8px; display: block; font-family: 'JetBrains Mono'; }
        .price { font-size: 24px; font-weight: 700; margin-bottom: 10px; font-family: 'JetBrains Mono'; }
        .change { font-size: 10px; font-weight: 800; padding: 3px 6px; border-radius: 4px; }
        .pos { color: var(--up); background: rgba(0, 255, 136, 0.1); }
        .neg { color: var(--down); background: rgba(255, 51, 102, 0.1); }

        /* WORLD NEWS */
        .world-news { width: 320px; border-left: 1px solid var(--border); background: #05070a; display: flex; flex-direction: column; }
        .news-header { padding: 20px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; }
        .news-scroll { flex: 1; overflow-y: auto; padding: 20px; }
        .news-card { margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #1a1d23; }
        .news-headline { font-size: 12px; font-weight: 600; color: #fff; text-decoration: none; line-height: 1.4; display: block; }
        .news-headline:hover { color: var(--accent); }

        /* MODAL DE GRÁFICO (O SEGREDO) */
        #chart-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; z-index: 10000;
            justify-content: center; align-items: center; backdrop-filter: blur(10px);
        }
        .modal-content { width: 90%; height: 85%; background: #000; border: 1px solid var(--accent); border-radius: 12px; position: relative; overflow: hidden; }
        .close-btn { position: absolute; top: 15px; right: 20px; color: #fff; font-size: 30px; cursor: pointer; z-index: 10001; font-weight: bold; }
        .close-btn:hover { color: var(--down); }

        /* TOOLTIP */
        #company-info { position: fixed; display: none; width: 260px; background: rgba(13,17,23,0.98); border: 1px solid var(--accent); border-radius: 8px; padding: 15px; z-index: 9999; pointer-events: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">ALPHA<span>MARKETCAP</span></div>
    <div id="real-clock" style="font-family: 'JetBrains Mono'; font-size: 12px; color: var(--text-dim)">00:00:00</div>
</header>

<div class="ticker-wrap"><div class="ticker" id="ticker-feed">CONECTANDO AO ALPHA TERMINAL...</div></div>

<div class="container">
    <aside id="side-menu"></aside>
    <main>
        <div class="grid" id="main-grid"></div>
        <div id="company-info">
            <div style="color:var(--accent); font-weight:800; font-size:13px; margin-bottom:5px" id="tt-name"></div>
            <div style="font-size:11px; line-height:1.4" id="tt-desc"></div>
        </div>
    </main>
    <section class="world-news">
        <div class="news-header">🌍 World Intelligence Feed</div>
        <div class="news-scroll" id="world-feed"></div>
    </section>
</div>

<div id="chart-modal">
    <span class="close-btn" onclick="closeChart()">&times;</span>
    <div class="modal-content" id="tv-container"></div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR9hPdpNw-jrALbP32-Pgqhwe_X98uaZht0tjtZXidCFwiXvXTjbJc5diOaI270W8m_hyHYpd5xwlQl/pub?gid=0&single=true&output=csv';
    
    function sanitize(val) { return val ? val.toString().replace(/["']/g, "").trim() : ""; }

    // FUNÇÃO PARA ABRIR O GRÁFICO
    function openChart(ticker) {
        const modal = document.getElementById('chart-modal');
        const container = document.getElementById('tv-container');
        modal.style.display = 'flex';
        
        // Limpar ticker (remove prefixo tipo B3: se houver)
        let cleanTicker = ticker.includes(':') ? ticker.split(':')[1] : ticker;
        
        container.innerHTML = `
            <iframe src="https://s.tradingview.com/widgetembed/?frameElementId=tradingview_762ae&symbol=${cleanTicker}&interval=D&hidesidetoolbar=0&symboledit=1&saveimage=1&toolbarbg=f1f3f6&studies=[]&theme=dark&style=1&timezone=Etc%2FUTC&studies_overrides={}&overrides={}&enabled_features=[]&disabled_features=[]&locale=br" 
            style="width: 100%; height: 100%; border: none;"></iframe>
        `;
    }

    function closeChart() {
        document.getElementById('chart-modal').style.display = 'none';
        document.getElementById('tv-container').innerHTML = '';
    }

    async function loadWorldNews() {
        try {
            const GOOGLE_NEWS_RSS = "https://news.google.com/rss?hl=pt-BR&gl=BR&ceid=BR:pt-419";
            const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(GOOGLE_NEWS_RSS)}`);
            const data = await response.json();
            if (data.status === 'ok') {
                document.getElementById('world-feed').innerHTML = data.items.map(item => `
                    <div class="news-card">
                        <span style="font-size:9px; color:var(--accent); font-weight:800">NEWS</span>
                        <a href="${item.link}" target="_blank" class="news-headline">${item.title}</a>
                    </div>
                `).join('');
            }
        } catch (e) {}
    }

    async function fetchData() {
        try {
            const r = await fetch(SHEET_URL);
            const text = await r.text();
            const rows = text.split(/\r?\n/).slice(1);
            window.stocks = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { ticker: sanitize(cols[0]), name: sanitize(cols[1]), price: sanitize(cols[2]), pct: sanitize(cols[3]), sector: sanitize(cols[4]), desc: sanitize(cols[5]) };
            }).filter(s => s.ticker);
            renderGrid(document.querySelector('.nav-item.active')?.innerText || "TECNOLOGIA");
            updateTicker();
        } catch (e) {}
    }

    function renderGrid(sector) {
        const container = document.getElementById('main-grid');
        container.innerHTML = '';
        const filtered = window.stocks.filter(s => s.sector.toUpperCase() === sector.toUpperCase());

        filtered.forEach(s => {
            const isPos = !s.pct.includes('-');
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="symbol">${s.ticker}</span>
                <div class="price">R$ ${s.price}</div>
                <span class="change ${isPos ? 'pos' : 'neg'}">${s.pct}</span>
            `;

            // CLIQUE PARA ABRIR GRÁFICO
            card.onclick = () => openChart(s.ticker);

            // HOVER PARA ÍNDICE
            card.onmousemove = (e) => {
                const tt = document.getElementById('company-info');
                document.getElementById('tt-name').innerText = s.name;
                document.getElementById('tt-desc').innerText = s.desc || "Descrição pendente...";
                tt.style.display = 'block';
                tt.style.left = (e.clientX + 15) + 'px'; tt.style.top = (e.clientY + 15) + 'px';
            };
            card.onmouseleave = () => { document.getElementById('company-info').style.display = 'none'; };
            container.appendChild(card);
        });
    }

    function updateTicker() {
        const feed = window.stocks.map(s => `${s.ticker}: R$ ${s.price}`).slice(0, 15).join('  ///  ');
        document.getElementById('ticker-feed').innerText = `+++ ALPHA GLOBAL FEED: ${feed} +++`;
    }

    const sectors = ["Tecnologia", "Defesa", "Energia", "Cibersegurança", "Bancos", "Commodities", "Logística", "Saúde", "Varejo", "Refúgio"];
    const menu = document.getElementById('side-menu');
    sectors.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = `nav-item ${i === 0 ? 'active' : ''}`;
        div.innerText = s.toUpperCase();
        div.onclick = function() {
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            this.classList.add('active');
            renderGrid(s);
        };
        menu.appendChild(div);
    });

    fetchData(); loadWorldNews();
    setInterval(fetchData, 60000);
    setInterval(loadWorldNews, 300000);
    setInterval(() => { document.getElementById('real-clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
