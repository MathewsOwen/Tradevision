<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHAMARKETCAP | The Alpha Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0e14;
            --accent: #00ffc3; /* Verde Dopamina */
            --danger: #ff0055; /* Rosa Alerta */
            --gold: #ffcc00;   /* Ouro Exclusivo */
            --text: #ffffff;
            --text-dim: #64748b;
            --border: rgba(0, 255, 195, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow: hidden;
            /* Grânulos de ruído sutil para textura de terminal caro */
            background-image: radial-gradient(circle at 50% 50%, #0a1118 0%, #000 100%);
        }

        /* Ticker com brilho neon */
        .live-ticker { 
            background: #000; 
            border-bottom: 1px solid var(--border); 
            padding: 10px 0; 
            font-family: 'JetBrains Mono'; 
            font-size: 11px; 
            color: var(--accent); 
            box-shadow: 0 0 15px rgba(0, 255, 195, 0.1);
        }

        header { 
            padding: 20px 30px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        
        .logo { 
            font-size: 22px; 
            font-weight: 800; 
            letter-spacing: -1px; 
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 255, 195, 0.3);
        }
        .logo span { color: var(--accent); }

        .container { display: flex; height: calc(100vh - 105px); }

        /* Sidebar com efeito de vidro */
        aside { 
            width: 240px; 
            background: rgba(10, 14, 20, 0.8); 
            padding: 25px; 
            border-right: 1px solid var(--border);
        }

        .nav-btn { 
            width: 100%; padding: 14px; background: transparent; border: none; 
            color: var(--text-dim); text-align: left; cursor: pointer; 
            font-weight: 700; margin-bottom: 8px; transition: 0.3s;
            font-size: 12px; letter-spacing: 1px;
            border-radius: 4px;
        }
        .nav-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-btn.active { 
            color: #000; 
            background: var(--accent); 
            box-shadow: 0 0 20px rgba(0, 255, 195, 0.4);
        }

        main { flex: 1; padding: 30px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        /* Card com Animação de Dopamina */
        .card { 
            background: #080a0f; 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            padding: 24px; 
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        .card:hover { 
            transform: scale(1.03); 
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(0, 255, 195, 0.15);
        }
        
        /* Gráfico de fundo mais nítido */
        .hover-chart {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 80px;
            opacity: 0.1; transition: 0.5s; pointer-events: none;
            filter: saturate(2) brightness(1.5);
        }
        .card:hover .hover-chart { opacity: 0.6; height: 100px; }

        .symbol { font-family: 'JetBrains Mono'; color: var(--accent); font-size: 13px; font-weight: 700; }
        .price { font-size: 32px; font-weight: 800; margin: 10px 0; letter-spacing: -1px; }
        
        .badge { 
            font-size: 11px; font-weight: 800; padding: 5px 10px; border-radius: 6px; 
            display: inline-flex; align-items: center; gap: 5px;
        }
        .up { background: rgba(0, 255, 195, 0.15); color: var(--accent); animation: pulse-green 2s infinite; }
        .down { background: rgba(255, 0, 85, 0.15); color: var(--danger); }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 195, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 195, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 195, 0); }
        }

        /* News Sidebar - Efeito Alpha */
        .news-sidebar {
            width: 50px; background: #05070a; border-left: 1px solid var(--border);
            transition: width 0.5s cubic-bezier(0.85, 0, 0.15, 1);
        }
        .news-sidebar:hover { width: 420px; }
        
        .news-indicator { height: 100%; display: flex; align-items: center; justify-content: center; }
        .news-indicator span { 
            transform: rotate(90deg); white-space: nowrap; font-size: 11px; 
            color: var(--gold); font-weight: 800; letter-spacing: 4px;
        }

        .news-content { padding: 30px; opacity: 0; transition: 0.3s; visibility: hidden; }
        .news-sidebar:hover .news-content { opacity: 1; visibility: visible; }

        .news-folder { margin-bottom: 20px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,204,0,0.2); }
        .folder-header { 
            padding: 16px; cursor: pointer; display: flex; justify-content: space-between; 
            font-size: 12px; font-weight: 800; color: var(--gold);
        }
        .news-item { padding: 15px; border-top: 1px solid rgba(255,204,0,0.1); }
        .news-time { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--accent); }
        .news-text { font-size: 14px; font-weight: 600; margin-top: 5px; line-height: 1.5; }

    </style>
</head>
<body>

<div class="live-ticker">
    <div class="ticker-move" id="live-ticker-inner">ALPHAMARKETCAP // ELITE TERMINAL // REAL-TIME DATA // DOPAMINE FLOW ENABLED...</div>
</div>

<header>
    <div class="logo">ALPHA<span>MARKETCAP</span></div>
    <div id="clock" style="font-family: 'JetBrains Mono'; font-size: 13px; color: var(--gold); font-weight: 700;">00:00:00</div>
</header>

<div class="container">
    <aside id="menu-side"></aside>

    <main>
        <div class="grid" id="market-grid"></div>
    </main>

    <div class="news-sidebar">
        <div class="news-indicator"><span>PREMIUM INTELLIGENCE</span></div>
        <div class="news-content">
            <div class="news-folder">
                <div class="folder-header" onclick="toggleFolder('today-news')">
                    🔥 TODAY'S ALPHA NEWS <span id="arrow-today">▼</span>
                </div>
                <div class="folder-body open" id="today-news" style="display:block;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR9hPdpNw-jrALbP32-Pgqhwe_X98uaZht0tjtZXidCFwiXvXTjbJc5diOaI270W8m_hyHYpd5xwlQl/pub?gid=0&single=true&output=csv';
    const sectors = ["Tecnologia", "Defesa", "Energia", "Cibersegurança", "Bancos", "Commodities", "Logística", "Saúde", "Varejo", "Refúgio"];
    
    const newsArchive = [
        { time: "15:30", text: "WHALE ALERT: Fluxo massivo detectado em opções de tecnologia." },
        { time: "12:10", text: "Alpha Cap indica: Momento de acumulação em ativos de Defesa." },
        { time: "09:00", text: "Terminal Conectado. Prepare-se para a volatilidade." }
    ];

    setInterval(() => { 
        document.getElementById('clock').innerText = new Date().toLocaleTimeString(); 
    }, 1000);

    function renderNews() {
        document.getElementById('today-news').innerHTML = newsArchive.map(n => `
            <div class="news-item">
                <span class="news-time">${n.time}</span>
                <p class="news-text">${n.text}</p>
            </div>
        `).join('');
    }

    async function loadData() {
        try {
            const response = await fetch(CSV_URL);
            const dataText = await response.text();
            const rows = dataText.split('\n').slice(1);
            
            window.allStocks = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return {
                    ticker: cols[0]?.replace(/"/g, '').trim(),
                    name: cols[1]?.replace(/"/g, ''),
                    price: cols[2],
                    change: cols[3]?.trim(),
                    sector: cols[4]?.trim()
                };
            }).filter(s => s.ticker && !s.ticker.includes('#N/A'));

            updateTicker();
            renderGrid(document.querySelector('.nav-btn.active')?.innerText || "TECNOLOGIA");
        } catch (e) {}
    }

    function updateTicker() {
        const tickerDiv = document.getElementById('live-ticker-inner');
        const text = window.allStocks.map(s => `${s.ticker}: R$ ${s.price} (${s.change})`).join('  ///  ');
        tickerDiv.innerText = `+++ ALPHA FEED: ${text} +++`;
    }

    function renderGrid(sectorName) {
        const grid = document.getElementById('market-grid');
        grid.innerHTML = '';
        const filtered = window.allStocks.filter(s => s.sector && s.sector.toLowerCase() === sectorName.toLowerCase());

        filtered.forEach(s => {
            const isUp = !s.change.includes('-');
            const chartUrl = `https://s3.tradingview.com/generated_chart_images/s_${s.ticker}.png`;

            grid.innerHTML += `
                <div class="card">
                    <span class="symbol">${s.ticker}</span>
                    <div class="price">R$ ${s.price}</div>
                    <div style="font-size:12px; color:var(--text-dim); margin-bottom:12px">${s.name}</div>
                    <span class="badge ${isUp ? 'up' : 'down'}">${isUp ? '🚀' : '📉'} ${s.change}</span>
                    <img class="hover-chart" src="${chartUrl}">
                </div>
            `;
        });
    }

    const menuContainer = document.getElementById('menu-side');
    sectors.forEach((sec, index) => {
        const btn = document.createElement('button');
        btn.className = `nav-btn ${index === 0 ? 'active' : ''}`;
        btn.innerText = sec.toUpperCase();
        btn.onclick = () => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderGrid(sec);
        };
        menuContainer.appendChild(btn);
    });

    loadData();
    renderNews();
    setInterval(loadData, 60000);
</script>
</body>
</html>
