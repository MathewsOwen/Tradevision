<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaMarketCap | Global Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <img src="Logo Alphamarketcap.jpg" alt="AlphaMarketCap" class="main-logo">
            <h2 class="splash-phrase">PRECISÃO • EXCLUSIVIDADE • ALPHA</h2>
            <div class="loader-container">
                <div class="loader-bar"></div>
            </div>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <header class="navbar">
            <div class="logo-nav">
                <img src="Logo Alphamarketcap.jpg" alt="Alpha Logo" class="nav-icon">
                <span>ALPHAMARKETCAP</span>
            </div>
            <div class="user-menu">
                <button id="loginBtn" class="btn-member">🔒 ÁREA DO MEMBRO</button>
            </div>
        </header>

        <main class="terminal-body">
            <div class="status-card">
                <h1>SISTEMA ONLINE</h1>
                <p>Aguardando autenticação do usuário...</p>
                <div class="terminal-line"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
