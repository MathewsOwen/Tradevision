<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaMarketCap | Terminal PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="terminal-dark">
    <div class="ticker-wrapper"><div class="ticker-content" id="bankTicker"></div></div>

    <header class="main-header">
        <div class="logo">ALPHAMARKETCAP <span class="version">V4.0_PRO</span></div>
        <div class="system-time" id="clock">00:00:00</div>
        <button class="btn-auth">AUTH_CONNECTION</button>
    </header>

    <div class="main-container">
        <aside class="control-sidebar">
            <nav class="nav-menu">
                <div class="nav-category">MARKET_OPERATIONS</div>
                <button class="nav-btn active">TERMINAL</button>
                <button class="nav-btn">QUANT_SIGNALS</button>
            </nav>
        </aside>

        <main class="viewport">
            <div class="workspace">
                <section class="chart-box">
                    <header class="panel-header">LIVE_MARKET_ENGINE</header>
                    <div class="chart-display" id="mainChart"></div>
                </section>
                <section class="movers-panel">
                    <header class="panel-header">MARKET_MOVERS</header>
                    <div id="gainers" class="movers-group"></div>
                    <div id="losers" class="movers-group"></div>
                </section>
            </div>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
