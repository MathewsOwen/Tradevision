<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeVision | Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    
    <style>
        :root {
            --bg: #020408; --surface: #0a0e14; --accent: #00ffc3;
            --danger: #ff4655; --text: #f8fafc; --text-dim: #64748b;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }

        header { padding: 15px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg); }
        .logo { font-size: 20px; font-weight: 800; color: var(--text); text-decoration: none; }
        .logo span { color: var(--accent); }

        /* Layout Principal */
        .container { display: flex; height: calc(100vh - 65px); position: relative; }

        /* Sidebar Esquerda (Fixa) */
        aside { width: 220px; background: var(--surface); padding: 20px; border-right: 1px solid var(--border); overflow-y: auto; }
        .nav-btn { width: 100%; padding: 12px; background: transparent; border: none; color: var(--text-dim); text-align: left; cursor: pointer; border-radius: 8px; font-weight: 600; margin-bottom: 5px; transition: 0.2s; }
        .nav-btn.active { color: var(--accent); background: rgba(0,255,195,0.05); }

        /* Área Central */
        main { flex: 1; padding: 25px; overflow-y: auto; transition: margin-right 0.3s ease; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }

        /* ABA DE NOTÍCIAS (RETRÁTIL AO PASSAR O MOUSE) */
        .news-sidebar {
            width: 40px; /* Largura apenas do "título" vertical */
            background: var(--surface);
            border-left: 1px solid var(--border);
            height: 100%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
        }

        /* Quando o mouse passa por cima */
        .news-sidebar:hover {
            width: 350px;
        }

        /* Texto Vertical de Indicação */
        .news-indicator {
            min-width: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,255,195,0.02);
            cursor: pointer;
        }
        .news-indicator span {
            transform: rotate(90deg);
            white-space: nowrap;
            font-size: 10px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Conteúdo das Notícias (Escondido por padrão) */
        .news-content {
            padding: 25px;
            min-width: 310px;
            opacity: 0;
            transition: opacity 0.3s;
            overflow-y: auto;
        }
        .news-sidebar:hover .news-content {
            opacity: 1;
        }

        .news-item { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .news-item:last-child { border: none; }
        .news-tag { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--accent); margin-bottom: 5px; display: block; }
        .news-text { font-size: 14px; font-weight: 600; line-height: 1.4; color: var(--text); }

        /* Estilo dos Cards (Baseado na sua imagem) */
        .card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; padding: 20px; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--accent); background: rgba(255,255,255,0.05); }
        .symbol { font-family: 'JetBrains Mono'; color: var(--text-dim); font-size: 11px; margin-bottom: 8px; display: block; }
        .price { font-size: 26px; font-weight: 800; margin-bottom: 15px; }
        .badge { font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 4px; display: inline-block; }
        .up { background: rgba(0,255,195,0.1); color: var(--accent); }
        .down { background: rgba(255,70,85,0.1); color: var(--danger); }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">Trade<span>Vision</span></a>
    <div id="clock" style="font-family: 'JetBrains Mono'; font-size: 12px; color: var(--text-dim)">00:00:00</div>
</header>

<div class="container">
    <aside id="menu-side"></aside>

    <main>
        <h2 id="sector-title" style="margin-bottom: 25px; color: var(--accent);">Tecnologia</h2>
        <div class="grid" id="market-grid"></div>
    </main>

    <div class="news-sidebar">
        <div class="news-indicator">
            <span>GLOBAL NEWS FEED</span>
        </div>
        <div class="news-content">
            <h3 style="font-size: 12px; margin-bottom: 20px; color: var(--text-dim); letter-spacing: 1px;">MERCADO HOJE</h3>
            <div id="news-list">
                </div>
        </div>
    </div>
</div>

<script>
    const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR9hPdpNw-jrALbP32-Pgqhwe_X98uaZht0tjtZXidCFwiXvXTjbJc5diOaI270W8m_hyHYpd5xwlQl/pub?gid=0&single=true&output=csv';
    const sectors = ["Tecnologia", "Defesa", "Energia", "Cibersegurança", "Bancos", "Commodities", "Logística", "Saúde", "Varejo", "Refúgio"];
    
    const newsData = [
        { source: "REUTERS", time: "10:45", text: "Fed indica manutenção de taxas de juros para o próximo trimestre." },
        { source: "BLOOMBERG", time: "10:15", text: "NVIDIA anuncia nova arquitetura de chips Blackwell para IA." },
        { source: "INVESTING", time: "09:55", text: "Tensões no Mar Vermelho elevam custo do frete marítimo global." },
        { source: "CNN BIZ", time: "09:10", text: "Petróleo Brent sobe 2.1% após novos dados de estoque da OPEP." }
    ];

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    function renderNews() {
        document.getElementById('news-list').innerHTML = newsData.map(n => `
            <div class="news-item">
                <span class="news-tag">${n.time} • ${n.source}</span>
                <p class="news-text">${n.text}</p>
            </div>
        `).join('');
    }

    async function update() {
        try {
            const r = await fetch(CSV);
            const t = await r.text();
            const store = t.split('\n').slice(1).map(row => {
                const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { t: c[0]?.replace(/"/g, ''), n: c[1]?.replace(/"/g, ''), p: c[2], v: c[3]?.trim(), s: c[4]?.trim() };
            }).filter(i => i.t && !i.t.includes('#N/A'));
            
            window.marketData = store;
            render(document.querySelector('.nav-btn.active')?.innerText || "TECNOLOGIA");
        } catch(e) {}
    }

    function render(sName) {
        document.getElementById('sector-title').innerText = sName;
        const g = document.getElementById('market-grid');
        g.innerHTML = '';
        
        const filtered = window.marketData.filter(i => i.s && i.s.toLowerCase() === sName.toLowerCase());
        
        if(filtered.length === 0) {
            g.innerHTML = `<p style="color:var(--text-dim)">Nenhum dado encontrado para este setor na planilha.</p>`;
            return;
        }

        filtered.forEach(i => {
            const up = !i.v.includes('-');
            g.innerHTML += `
                <div class="card">
                    <span class="symbol">${i.t}</span>
                    <div class="price">R$ ${i.p}</div>
                    <div style="font-size:12px; color:var(--text-dim); margin-bottom:12px">${i.n}</div>
                    <span class="badge ${up ? 'up' : 'down'}">${up ? '▲' : '▼'} ${i.v}</span>
                </div>
            `;
        });
    }

    const menu = document.getElementById('menu-side');
    sectors.forEach((s, idx) => {
        const b = document.createElement('button');
        b.className = `nav-btn ${idx === 0 ? 'active' : ''}`;
        b.innerText = s.toUpperCase();
        b.onclick = () => {
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            render(s);
        };
        menu.appendChild(b);
    });

    update();
    renderNews();
</script>
</body>
</html>
