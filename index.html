<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaMarketCap | Terminal</title>
    <style>
        /* ESTILO ALPHA ESTÁVEL */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #0a0a0a;
            color: #d4af37; /* Dourado Alpha */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: #000;
            border-bottom: 1px solid #1a1a1a;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 3px;
        }

        .btn-login {
            background: transparent;
            border: 1px solid #00f3ff; /* Azul Neon */
            color: #00f3ff;
            padding: 10px 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .btn-login:hover {
            background: #00f3ff;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.6);
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            flex-direction: column;
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 10px;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            letter-spacing: 4px;
            font-size: 0.9rem;
        }

        .status-bar {
            margin-top: 30px;
            width: 150px;
            height: 2px;
            background: #d4af37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">ALPHAMARKETCAP</div>
        <button class="btn-login" id="loginBtn">ACESSAR TERMINAL</button>
    </header>

    <main>
        <h1>GLOBAL INTELLIGENCE</h1>
        <p>TERMINAL DE DADOS FINANCEIROS</p>
        <div class="status-bar"></div>
    </main>

    <script>
        // Lógica simples inicial
        document.getElementById('loginBtn').addEventListener('click', () => {
            alert('Iniciando conexão segura com o Firebase...');
        });
    </script>
</body>
</html>
