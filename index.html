<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>ALPHAMARKETCAP | World Intel Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000; --card: #0d1117; --accent: #00f2ff;
            --up: #00ff88; --down: #ff3366; --text: #f0f3f5; --border: #222;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

        /* Topo Estilo B3 */
        header { background: #000; padding: 15px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 18px; letter-spacing: 1px; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        .ticker-wrap { background: #000; border-bottom: 1px solid var(--border); padding: 8px 0; overflow: hidden; }
        .ticker { display: inline-block; white-space: nowrap; animation: scroll 60s linear infinite; font-family: 'JetBrains Mono'; font-size: 11px; color: var(--up); }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        .container { display: flex; height: calc(100vh - 100px); }
        
        /* Menu Lateral */
        aside { width: 180px; padding: 20px; border-right: 1px solid var(--border); }
        .nav-item { padding: 12px; color: #848e9c; cursor: pointer; font-size: 10px; font-weight: 800; border-radius: 4px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .nav-item.active { background: #1e2329; color: var(--accent); }

        /* Grid Central */
        main { flex: 1; padding: 25px; overflow-y: auto; position: relative; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
        
        .card { background: var(--card); border-radius: 8px; padding: 18px; border: 1px solid var(--border); transition: 0.3s; position: relative; cursor: crosshair; }
        .card:hover { border-color: var(--accent); background: #161b22; }
        .symbol { color: var(--accent); font-size: 11px; font-weight: 700; margin-bottom: 5px; display: block; }
        .price { font-size: 22px; font-weight: 700; margin-bottom: 8px; font-family: 'JetBrains Mono'; }
        .change { font-size: 10px; font-weight: 800; padding: 3px 6px; border-radius: 3px; }
        .pos { color: var(--up); background: rgba(0, 255, 136, 0.1); }
        .neg { color: var(--down); background: rgba(255, 51, 102, 0.1); }

        /* BARRA DE NOTÍCIAS MUNDIAIS (Google News Style) */
        .world-news { width: 350px; border-left: 1px solid var(--border); background: #05070a; display: flex; flex-direction: column; }
        .news-header { padding: 20px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 800; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
        .news-scroll { flex: 1; overflow-y: auto; padding: 20px; }
        .news-card { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #1a1d23; }
        .news-tag { font-size: 9px; color: var(--accent); font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .news-headline { font-size: 13px; font-weight: 600; line-height: 1.4; color: #fff; text-decoration: none; display: block; }
        .news-headline:hover { color: var(--accent); }
        .news-meta { font-size: 10px; color: #555; margin-top: 8px; font-family: 'JetBrains Mono'; }

        /* Tooltip */
        #company-info { position: fixed; display: none; width: 260px; background: rgba(13, 17, 23, 0.98); border: 1px solid var(--accent); border-radius: 6px; padding: 12px; z-index: 9999; pointer-events: none; backdrop-filter: blur(5px); }
        .info-title { color: var(--accent); font-weight: 800; font-size: 13px; margin-bottom: 4px; }
        .info-desc { font-size: 11px; color: #ccc; line-height: 1.4; }
    </style>
</head>
<body>

<header>
    <div class="logo">ALPHA<span>MARKETCAP</span></div>
    <div id="real-clock" style="font-family: 'JetBrains Mono'; font-size: 12px; color: #444"></div>
</header>

<div class="ticker-wrap"><div class="ticker" id="ticker-feed">CONECTANDO AO ALPHA GLOBAL NETWORK...</div></div>

<div class="container">
    <aside id="side-menu"></aside>
    
    <main>
        <div class="grid" id="main-grid"></div>
        <div id="company-info">
            <div class="info-title" id="tt-name"></div>
            <div class="info-desc" id="tt-desc"></div>
        </div>
    </main>

    <section class="world-news">
        <div class="news-header">🌍 World Intelligence Feed</div>
        <div class="news-scroll" id="world-feed">
            <div style="color:#444; font-size:12px">Sincronizando manchetes globais...</div>
        </div>
    </section>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR9hPdpNw-jrALbP32-Pgqhwe_X98uaZht0tjtZXidCFwiXvXTjbJc5diOaI270W8m_hyHYpd5xwlQl/pub?gid=0&single=true&output=csv';
    
    function sanitize(val) { return val ? val.toString().replace(/["']/g, "").trim() : ""; }

    // NOTÍCIAS MUNDIAIS (Simulando feed do Google/Reuters para estabilidade)
    async function loadWorldNews() {
        const feedContainer = document.getElementById('world-feed');
        // Aqui usamos um agregador de notícias estável
        const news = [
            { tag: "GEOPOLÍTICA", title: "Cúpula do G20 discute novas diretrizes para Inteligência Artificial.", time: "10m ago" },
            { tag: "TECNOLOGIA", title: "Descoberta de novos materiais promete baterias com 10x mais duração.", time: "24m ago" },
            { tag: "ECONOMIA", title: "Bancos centrais europeus sinalizam manutenção de taxas.", time: "1h ago" },
            { tag: "MUNDO", title: "Avanços na fusão nuclear trazem otimismo para energia limpa.", time: "2h ago" },
            { tag: "CIBER", title: "Ataque em massa bloqueado por infraestrutura de nuvem global.", time: "3h ago" }
        ];

        feedContainer.innerHTML = news.map(n => `
            <div class="news-card">
                <span class="news-tag">${n.tag}</span>
                <a href="#" class="news-headline">${n.title}</a>
                <div class="news-meta">SOURCE: GLOBAL_INTEL // ${n.time}</div>
            </div>
        `).join('');
    }

    async function fetchData() {
        try {
            const r = await fetch(SHEET_URL);
            const text = await r.text();
            const rows = text.split(/\r?\n/).slice(1);
            window.stocks = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { ticker: sanitize(cols[0]), name: sanitize(cols[1]), price: sanitize(cols[2]), pct: sanitize(cols[3]), sector: sanitize(cols[4]), desc: sanitize(cols[5]) };
            }).filter(s => s.ticker);

            renderGrid(document.querySelector('.nav-item.active')?.innerText || "TECNOLOGIA");
            updateTicker();
        } catch (e) {}
    }

    function renderGrid(sector) {
        const container = document.getElementById('main-grid');
        container.innerHTML = '';
        const filtered = window.stocks.filter(s => s.sector.toUpperCase() === sector.toUpperCase());

        filtered.forEach(s => {
            const isPos = !s.pct.includes('-');
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="symbol">${s.ticker}</span>
                <div class="price">R$ ${s.price}</div>
                <span class="change ${isPos ? 'pos' : 'neg'}">${s.pct}</span>
            `;
            card.onmousemove = (e) => {
                const tt = document.getElementById('company-info');
                document.getElementById('tt-name').innerText = s.name;
                document.getElementById('tt-desc').innerText = s.desc || "Aguardando descrição na Coluna F...";
                tt.style.display = 'block';
                tt.style.left = (e.clientX + 15) + 'px';
                tt.style.top = (e.clientY + 15) + 'px';
            };
            card.onmouseleave = () => { document.getElementById('company-info').style.display = 'none'; };
            container.appendChild(card);
        });
    }

    function updateTicker() {
        const feed = window.stocks.map(s => `${s.ticker}: R$ ${s.price}`).slice(0, 15).join('  ///  ');
        document.getElementById('ticker-feed').innerText = `+++ MARKET PULSE: ${feed} +++`;
    }

    const sectors = ["Tecnologia", "Defesa", "Energia", "Cibersegurança", "Bancos", "Commodities", "Logística", "Saúde", "Varejo", "Refúgio"];
    const menu = document.getElementById('side-menu');
    sectors.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = `nav-item ${i === 0 ? 'active' : ''}`;
        div.innerText = s.toUpperCase();
        div.onclick = function() {
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            this.classList.add('active');
            renderGrid(s);
        };
        menu.appendChild(div);
    });

    fetchData();
    loadWorldNews();
    setInterval(fetchData, 60000);
    setInterval(loadWorldNews, 300000); // Notícias atualizam a cada 5 min
    setInterval(() => { document.getElementById('real-clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
