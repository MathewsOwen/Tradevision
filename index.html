<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AlphaMarketCap | Global Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=600">
</head>
<body class="private-edition">

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <div class="top-bar">
        <div class="ticker-track" id="globalTicker">
            </div>
    </div>

    <header class="header">
        <div class="container header-flex">
            <div class="brand">
                <span class="logo-gold-stylized">ALPHA</span><span class="logo-white-stylized">MARKETCAP</span>
            </div>
            <nav class="nav">
                <button class="nav-link-pill active" onclick="switchTab('market')">INÍCIO</button>
                <button class="nav-link-pill" onclick="switchTab('news')">FEED DE NOTÍCIAS</button>
            </nav>
        </div>
    </header>

    <main class="container main-grid">
        <section class="chart-section" id="marketView">
            <div class="card chart-card">
                <div id="tradingview_alpha"></div>
            </div>
        </section>

        <aside class="ranking-section" id="rankingView">
            <div class="card ranking-card">
                <div class="tabs-ranking-pills">
                    <button id="btn-high" class="pill-btn active" onclick="toggleRanking('high')">TOP 10 ALTAS</button>
                    <button id="btn-low" class="pill-btn" onclick="toggleRanking('low')">TOP 10 BAIXAS</button>
                </div>
                <div id="highList" class="asset-list"></div>
                <div id="lowList" class="asset-list hidden"></div>
            </div>
        </aside>

        <section class="news-section hidden" id="newsView">
            <div class="card">
                <h2 class="gold-title">CENTRAL DE INTELIGÊNCIA // MUNDIAL</h2>
                <div id="newsFeed" class="news-grid"></div>
            </div>
        </section>
    </main>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script src="js/app.js?v=600"></script>
</body>
</html>
