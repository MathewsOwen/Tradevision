<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHAMARKETCAP | Inteligência de Mercado</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e11; --accent: #00f2ff; --surface: #151921; --border: #2b2f3a; --up: #00ff88; --down: #ff3366; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- SPLASH SCREEN COM SLOGAN --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 1s ease, visibility 1s;
        }

        .splash-content { text-align: center; }

        .splash-logo {
            font-size: clamp(40px, 8vw, 80px); /* Tamanho Grande e Responsivo */
            font-weight: 900;
            letter-spacing: -2px;
            text-transform: uppercase;
            color: #fff;
            line-height: 1;
            margin-bottom: 15px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s forwards;
        }

        .splash-logo span { color: var(--accent); }

        .splash-slogan {
            font-size: clamp(14px, 2vw, 22px);
            font-weight: 300;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 1.5s 0.8s forwards; /* Começa após o nome */
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* --- BARRA DE CARREGAMENTO DISCRETA --- */
        .loader-container {
            width: 200px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            margin-top: 40px;
            overflow: hidden;
            position: relative;
        }
        .loader-fill {
            position: absolute;
            height: 100%;
            background: var(--accent);
            width: 0;
            animation: load 3s forwards;
        }
        @keyframes load { to { width: 100%; } }

        /* --- RESTO DO SITE (ESTILO PORTAL B3) --- */
        #site-content { opacity: 0; transition: opacity 1.5s ease; }
        
        header { background: #000; height: 70px; display: flex; align-items: center; padding: 0 5%; border-bottom: 3px solid var(--accent); }
        .logo-header { font-weight: 800; font-size: 20px; text-transform: uppercase; }
        .logo-header span { color: var(--accent); }

        .main-portal { max-width: 1400px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .hero-box { background: var(--surface); border: 1px solid var(--border); padding: 30px; border-radius: 4px; }
        .side-box { background: var(--surface); border: 1px solid var(--border); padding: 25px; border-radius: 4px; }

        .stock-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="splash-content">
        <div class="splash-logo">ALPHA<span>MARKETCAP</span></div>
        <div class="splash-slogan">Inteligência para quem move mercados.</div>
        <div class="loader-container">
            <div class="loader-fill"></div>
        </div>
    </div>
</div>

<div id="site-content">
    <header>
        <div class="logo-header">ALPHA<span>MARKETCAP</span></div>
    </header>

    <div class="main-portal">
        <div class="hero-box">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h2 style="font-weight:800;">MERCADO BRASIL</h2>
                <div id="clock" style="font-family:'JetBrains Mono'; color:var(--accent)">00:00:00</div>
            </div>
            <div id="tradingview_chart" style="height:450px;"></div>
        </div>

        <div class="side-box">
            <h3 style="font-size:12px; color:var(--accent); letter-spacing:1px; margin-bottom:20px; text-transform:uppercase;">Maiores Volumes</h3>
            <div id="stocks-list"></div>
        </div>
    </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR9hPdpNw-jrALbP32-Pgqhwe_X98uaZht0tjtZXidCFwiXvXTjbJc5diOaI270W8m_hyHYpd5xwlQl/pub?gid=0&single=true&output=csv';

    // Controle da Splash Screen
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('splash-screen').style.opacity = '0';
            document.getElementById('splash-screen').style.visibility = 'hidden';
            document.getElementById('site-content').style.opacity = '1';
        }, 3500); // 3.5 segundos para apreciar o slogan
    });

    // Gráfico B3 Style
    new TradingView.widget({
        "container_id": "tradingview_chart",
        "symbol": "BMFBOVESPA:IBOV",
        "interval": "D", "theme": "dark", "style": "3", "locale": "br", "width": "100%", "height": "100%", "hide_top_toolbar": true
    });

    // Dados da Planilha
    async function getMarketData() {
        const res = await fetch(SHEET_URL);
        const text = await res.text();
        const rows = text.split('\n').slice(1);
        const list = document.getElementById('stocks-list');
        
        rows.slice(0, 10).forEach(row => {
            const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if(c[0]) {
                const ticker = c[0].replace(/"/g,'');
                const pct = c[3] || '0.00%';
                list.innerHTML += `
                    <div class="stock-row">
                        <strong>${ticker}</strong>
                        <span style="color:${pct.includes('-') ? 'var(--down)' : 'var(--up)'}">${pct}</span>
                    </div>`;
            }
        });
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    getMarketData();
</script>
</body>
</html>
