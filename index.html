<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaMarketCap | Enterprise Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="terminal-dark">

    <div class="ticker-wrapper">
        <div class="ticker-content" id="bankTicker"></div>
    </div>
    <div class="white-divider"></div> <header class="main-header">
        <div class="logo">ALPHAMARKETCAP <span class="version">V5.1_PRO</span></div>
        <div class="system-clock" id="clock">00:00:00</div>
        <button class="btn-terminal" id="authBtn">AUTH_CONNECTION</button>
    </header>

    <div class="app-body">
        <aside class="sidebar">
            <nav id="mainNav">
                <div class="nav-label">OPERATIONS</div>
                <button class="nav-btn active" data-target="dashboard">DASHBOARD</button>
                <button class="nav-btn" data-target="signals">QUANT_SIGNALS</button>
                <button class="nav-btn" data-target="liquidity">LIQUIDITY</button>
            </nav>
        </aside>

        <main class="main-view">
            <div class="grid-layout" id="view-dashboard">
                <section class="panel chart-panel">
                    <header class="panel-header">TRADINGVIEW_ENGINE // LIVE_FEED</header>
                    <div id="tradingview_alpha" class="tv-container"></div>
                </section>

                <section class="panel movers-panel">
                    <header class="panel-header">MARKET_MOVERS_24H</header>
                    <div class="movers-content" id="moversList">
                        </div>
                </section>
            </div>
            
            <div class="panel hidden-view" id="view-signals">
                <header class="panel-header">QUANTUM_SIGNALS_FEED</header>
                <div class="placeholder-content">AGUARDANDO CONEXÃO COM O FIREBASE PARA SINAIS EM TEMPO REAL...</div>
            </div>

            <div class="panel hidden-view" id="view-liquidity">
                <header class="panel-header">GLOBAL_LIQUIDITY_MAP</header>
                <div class="placeholder-content">MAPA DE CALOR DE LIQUIDIDADE EM DESENVOLVIMENTO.</div>
            </div>
        </main>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
