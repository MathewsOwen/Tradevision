<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>ALPHAMARKETCAP | Institutional Grade</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e11; --card: #151921; --accent: #00f2ff;
            --up: #00ff88; --down: #ff3366; --text: #f0f3f5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

        /* HEADER ESTILO B3 */
        header { 
            background: #000; padding: 15px 30px; border-bottom: 1px solid #222;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-weight: 800; font-size: 18px; color: #fff; letter-spacing: 1px; }
        .logo span { color: var(--accent); }

        /* TICKER LIMPO */
        .ticker-wrap { background: #000; border-bottom: 1px solid #222; padding: 8px 0; overflow: hidden; }
        .ticker { display: inline-block; white-space: nowrap; animation: scroll 60s linear infinite; font-family: 'JetBrains Mono'; font-size: 11px; color: var(--up); }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        .container { display: flex; height: calc(100vh - 100px); }
        
        /* MENU LATERAL SLIM */
        aside { width: 200px; padding: 20px; border-right: 1px solid #222; background: #0b0e11; }
        .nav-item { 
            padding: 12px; color: #848e9c; cursor: pointer; font-size: 12px; 
            font-weight: 700; border-radius: 4px; margin-bottom: 4px; transition: 0.2s;
        }
        .nav-item:hover, .nav-item.active { background: #1e2329; color: var(--accent); }

        /* GRID PROFISSIONAL */
        main { flex: 1; padding: 30px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        
        .card { 
            background: var(--card); border-radius: 8px; padding: 20px; 
            border: 1px solid transparent; transition: 0.3s; position: relative;
        }
        .card:hover { border-color: var(--accent); background: #1e2329; }

        .symbol { color: #848e9c; font-size: 12px; font-weight: 700; margin-bottom: 8px; display: block; }
        .price { font-size: 24px; font-weight: 700; margin-bottom: 10px; font-family: 'JetBrains Mono'; }
        .change { font-size: 12px; font-weight: 700; padding: 4px 8px; border-radius: 4px; }
        .change.positive { color: var(--up); background: rgba(0, 255, 136, 0.1); }
        .change.negative { color: var(--down); background: rgba(255, 51, 102, 0.1); }

        /* SPARKLINE NO HOVER */
        .sparkline {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 50px;
            opacity: 0; transition: 0.4s; pointer-events: none;
        }
        .card:hover .sparkline { opacity: 0.4; }

        /* NOTÍCIAS ESTILO TERMINAL */
        .news-bar { width: 300px; background: #0b0e11; border-left: 1px solid #222; padding: 25px; overflow-y: auto; }
        .news-title { font-size: 11px; color: #848e9c; letter-spacing: 1px; margin-bottom: 20px; font-weight: 800; }
        .news-item { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #1e2329; }
        .news-time { color: var(--accent); font-size: 10px; font-family: 'JetBrains Mono'; }
        .news-txt { font-size: 13px; font-weight: 600; line-height: 1.4; margin-top: 5px; }
    </style>
</head>
<body>

<header>
    <div class="logo">ALPHA<span>MARKETCAP</span></div>
    <div id="real-clock" style="font-family: 'JetBrains Mono'; font-size: 12px; color: #848e9c"></div>
</header>

<div class="ticker-wrap"><div class="ticker" id="ticker-feed">CONECTANDO AO FEED INSTITUCIONAL...</div></div>

<div class="container">
    <aside id="side-menu"></aside>
    <main><div class="grid" id="main-grid"></div></main>
    <div class="news-bar">
        <div class="news-title">GLOBAL NEWS FEED</div>
        <div id="news-feed"></div>
    </div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR9hPdpNw-jrALbP32-Pgqhwe_X98uaZht0tjtZXidCFwiXvXTjbJc5diOaI270W8m_hyHYpd5xwlQl/pub?gid=0&single=true&output=csv';
    const SECTORS = ["Tecnologia", "Defesa", "Energia", "Cibersegurança", "Bancos", "Commodities", "Logística", "Saúde", "Varejo", "Refúgio"];

    // LIMPEZA DE DADOS (Remove aspas, espaços e lixo)
    function sanitize(val) { return val ? val.toString().replace(/["']/g, "").trim() : ""; }

    async function fetchData() {
        try {
            const r = await fetch(SHEET_URL);
            const text = await r.text();
            const rows = text.split('\n').slice(1);
            
            window.stocks = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return {
                    ticker: sanitize(cols[0]),
                    name: sanitize(cols[1]),
                    price: sanitize(cols[2]),
                    pct: sanitize(cols[3]),
                    sector: sanitize(cols[4])
                };
            }).filter(s => s.ticker && !s.ticker.includes("#N/A"));

            renderGrid(document.querySelector('.nav-item.active')?.innerText || "TECNOLOGIA");
            updateTicker();
        } catch (e) { console.error("Erro na conexão Alpha."); }
    }

    function updateTicker() {
        const feed = window.stocks.map(s => `${s.ticker} R$ ${s.price} (${s.pct})`).join('  •  ');
        document.getElementById('ticker-feed').innerText = `+++ MARKET DATA: ${feed} +++`;
    }

    function renderGrid(sector) {
        const container = document.getElementById('main-grid');
        container.innerHTML = '';
        const filtered = window.stocks.filter(s => s.sector.toUpperCase() === sector.toUpperCase());

        filtered.forEach(s => {
            const isPos = !s.pct.includes('-');
            const cleanTicker = s.ticker.includes(':') ? s.ticker.split(':')[1] : s.ticker;
            
            container.innerHTML += `
                <div class="card">
                    <span class="symbol">${s.ticker}</span>
                    <div class="price">R$ ${s.price}</div>
                    <span class="change ${isPos ? 'positive' : 'negative'}">${isPos ? '▲' : '▼'} ${s.pct}</span>
                    <img class="sparkline" src="https://s3.tradingview.com/generated_chart_images/s_${cleanTicker}.png">
                </div>
            `;
        });
    }

    // MENU LATERAL
    const menu = document.getElementById('side-menu');
    SECTORS.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = `nav-item ${i === 0 ? 'active' : ''}`;
        div.innerText = s.toUpperCase();
        div.onclick = function() {
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            this.classList.add('active');
            renderGrid(s);
        };
        menu.appendChild(div);
    });

    // NEWS FEED (Exemplo dinâmico)
    const news = [
        {time: "10:45", txt: "Fed indica manutenção de taxas de juros para o próximo trimestre."},
        {time: "10:30", txt: "NVIDIA anuncia nova arquitetura de chips para IA generativa."},
        {time: "09:55", txt: "Tensões no Mar Vermelho elevam custo do frete marítimo global."}
    ];
    document.getElementById('news-feed').innerHTML = news.map(n => `
        <div class="news-item">
            <div class="news-time">${n.time}</div>
            <div class="news-txt">${n.txt}</div>
        </div>
    `).join('');

    setInterval(() => { document.getElementById('real-clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    fetchData();
    setInterval(fetchData, 30000);
</script>
</body>
</html>
