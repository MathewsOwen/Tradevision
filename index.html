<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sua Identidade | Market Insights</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="logo">NOSSA<span>IDENTIDADE</span></div>
        <ul class="nav-links">
            <li><a href="#">Soluções</a></li>
            <li><a href="#">Dados de Mercado</a></li>
            <li><a href="#">Institucional</a></li>
            <li><a href="#" class="btn-acesso">Acessar Plataforma</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Liderança e <span>Inteligência</span> em Dados.</h1>
            <p>Acompanhe o mercado com a precisão que o seu negócio exige.</p>
            <button class="cta-button">Começar Agora</button>
        </div>
        <div class="hero-chart">
            <canvas id="impactChart"></canvas>
        </div>
    </header>

    <div class="ticker-wrap">
        <div class="ticker">
            <div class="ticker__item">ATIVO 01: +2.45%</div>
            <div class="ticker__item">ATIVO 02: -0.12%</div>
            <div class="ticker__item">SUA MARCA: EM ALTA</div>
            <div class="ticker__item">INDICE X: +1.80%</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
