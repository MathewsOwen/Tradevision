<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaMarketCap | Global Intelligence</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <img src="logo-alpha.jpg" alt="AlphaMarketCap Logo" class="main-logo">
            <h2 class="splash-phrase">PRECISÃO • EXCLUSIVIDADE • ALPHA</h2>
            <div class="loader-container">
                <div class="loader-bar"></div>
            </div>
        </div>
    </div>

    <div id="main-content">
        <header class="navbar">
            <div class="logo-nav">
                <img src="logo-alpha.jpg" alt="Logo" width="40">
                <span>ALPHAMARKETCAP</span>
            </div>
            
            <div class="user-menu">
                <button id="loginBtn" class="btn-member">
                    <span class="icon">🔒</span> ÁREA DO MEMBRO
                </button>
            </div>
        </header>

        <main class="terminal-container">
            <section class="market-overview">
                <div class="card">
                    <h3>BEM-VINDO AO TERMINAL</h3>
                    <p>Conectando aos mercados globais...</p>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
