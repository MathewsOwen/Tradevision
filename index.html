<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AlphaMarketCap - Inteligência Global e Monitoramento Quântico de Ativos.">
    <title>AlphaMarketCap | Enterprise Terminal</title>
    
    <style>
        /* DESIGN SYSTEM - ALPHA CORE V3 */
        :root {
            --bg-black: #020202;
            --panel-dark: #080808;
            --accent-cyan: #00f3ff;
            --text-silver: #e0e0e0;
            --dim-gray: #666;
            --border-line: #1a1a1a;
            --glow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background-color: var(--bg-black);
            color: var(--text-silver);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER CORPORATIVO */
        .header {
            height: 65px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            border-bottom: 1px solid var(--border-line);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .brand { font-weight: 900; letter-spacing: 5px; color: var(--accent-cyan); font-family: monospace; }
        
        .market-ticker { font-size: 11px; display: flex; gap: 25px; font-family: monospace; }
        .up { color: #00ff00; }
        .down { color: #ff0000; }

        .btn-access {
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 10px 25px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-access:hover {
            background: var(--accent-cyan);
            color: #000;
            box-shadow: var(--glow);
        }

        /* DASHBOARD LAYOUT */
        .container { display: flex; flex: 1; }

        .sidebar {
            width: 250px;
            background: #000;
            border-right: 1px solid var(--border-line);
            display: flex;
            flex-direction: column;
            padding: 30px 0;
        }

        .nav-link {
            padding: 15px 30px;
            color: var(--dim-gray);
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 2px;
            border-left: 3px solid transparent;
            transition: 0.2s;
        }

        .nav-link.active, .nav-link:hover {
            color: var(--accent-cyan);
            background: rgba(0, 243, 255, 0.03);
            border-left: 3px solid var(--accent-cyan);
        }

        /* VIEWPORT & CHARTS */
        .viewport { flex: 1; padding: 30px; display: flex; flex-direction: column; gap: 25px; }

        .chart-container {
            flex: 1;
            background: var(--panel-dark);
            border: 1px solid var(--border-line);
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .chart-engine {
            flex: 1;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            border-left: 1px solid #222;
            border-bottom: 1px solid #222;
            padding: 10px;
        }

        .candle {
            flex: 1;
            background: var(--accent-cyan);
            box-shadow: var(--glow);
            min-width: 10px;
            transition: height 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card {
            background: var(--panel-dark);
            border: 1px solid var(--border-line);
            padding: 20px;
        }

        .card label { font-size: 10px; color: var(--dim-gray); display: block; margin-bottom: 8px; letter-spacing: 1px; }
        .card .val { font-size: 1.2rem; font-family: monospace; font-weight: bold; }
    </style>
</head>
<body>

    <header class="header">
        <div class="brand">ALPHAMARKETCAP // V3</div>
        <div class="market-ticker">
            <span>BTC <span class="up">▲ $64.2K</span></span>
            <span>ETH <span class="up">▲ $3.4K</span></span>
            <span>GOLD <span class="down">▼ $2.1K</span></span>
        </div>
        <button class="btn-access" id="loginBtn">ACCESS_TERMINAL</button>
    </header>

    <div class="container">
        <aside class="sidebar">
            <a href="#" class="nav-link active">DASHBOARD</a>
            <a href="#" class="nav-link">LIVE_TRADING</a>
            <a href="#" class="nav-link">QUANT_SIGNALS</a>
            <a href="#" class="nav-link">ENTERPRISE_AI</a>
        </aside>

        <main class="viewport">
            <div class="chart-container">
                <div style="display:flex; justify-content: space-between; margin-bottom: 20px;">
                    <h3 style="font-size: 12px; letter-spacing: 3px; color: var(--dim-gray);">GLOBAL_MARKET_MONITOR</h3>
                    <span style="color: var(--accent-cyan); font-size: 10px;">LIVE_FEED [60FPS]</span>
                </div>
                <div class="chart-engine" id="engine"></div>
            </div>

            <div class="stats-grid">
                <div class="card"><label>LATENCY</label><div class="val">14ms</div></div>
                <div class="card"><label>SENTIMENT</label><div class="val" style="color: var(--accent-cyan)">BULLISH</div></div>
                <div class="card"><label>NODES</label><div class="val">CORE_01</div></div>
            </div>
        </main>
    </div>

    <script>
        // CORE LOGIC - ENGINE DE MONITORAMENTO
        document.addEventListener('DOMContentLoaded', () => {
            const engine = document.getElementById('engine');
            const bars = 30;

            for(let i=0; i < bars; i++) {
                const bar = document.createElement('div');
                bar.className = 'candle';
                bar.style.height = (Math.random() * 70 + 20) + '%';
                engine.appendChild(bar);
            }

            // Simulação de Mercado Real-Time
            setInterval(() => {
                document.querySelectorAll('.candle').forEach(c => {
                    const h = parseFloat(c.style.height);
                    const delta = (Math.random() * 12) - 6;
                    c.style.height = Math.max(15, Math.min(95, h + delta)) + '%';
                });
            }, 900);

            document.getElementById('loginBtn').addEventListener('click', () => {
                console.log("AlphaAuth: Redirecionando para Gateway Seguro...");
                alert("ACESSO NEGADO: Integração Firebase em andamento.");
            });
        });
    </script>
</body>
</html>
