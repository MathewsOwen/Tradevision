<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaMarketCap | Terminal PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="terminal-dark">

    <div class="ticker-wrapper">
        <div class="ticker-content" id="bankTicker"></div>
    </div>

    <header class="main-header">
        <div class="logo">ALPHAMARKETCAP <span class="version">V4.0_PRO</span></div>
        <div class="system-clock" id="clock">00:00:00</div>
        <button class="btn-terminal" id="loginBtn">AUTH_CONNECTION</button>
    </header>

    <div class="app-body">
        <aside class="sidebar">
            <nav>
                <div class="nav-label">OPERATIONS</div>
                <a href="#" class="nav-item active">TERMINAL</a>
                <a href="#" class="nav-item">QUANT_SIGNALS</a>
                <a href="#" class="nav-item">LIQUIDITY</a>
            </nav>
        </aside>

        <main class="main-view">
            <div class="grid-layout">
                <section class="panel chart-panel">
                    <header class="panel-header">LIVE_MARKET_ENGINE [REAL-TIME]</header>
                    <div class="canvas-area" id="mainChart"></div>
                </section>

                <section class="panel movers-panel">
                    <header class="panel-header">MARKET_MOVERS_24H</header>
                    <div class="movers-content">
                        <div class="list-title">HIGH_GAINERS</div>
                        <div id="gainers" class="movers-list"></div>
                        
                        <div class="list-title" style="margin-top: 20px;">TOP_LOSERS</div>
                        <div id="losers" class="movers-list"></div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
